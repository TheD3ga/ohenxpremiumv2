    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --primary: #ed1c24;
            --bg-dark: #050505;
            --glass: rgba(15, 15, 15, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            overflow-x: hidden;
        }

        .glass-header {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-dropdown {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 350px;
            overflow-y: auto;
            display: none;
        }

        .game-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(237, 28, 36, 0.2);
        }

        .category-pill {
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .category-pill:hover, .category-pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(237, 28, 36, 0.4);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .recommendation-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1.5rem;
            padding-bottom: 1rem;
            scrollbar-width: none;
        }
        
        .recommendation-slider::-webkit-scrollbar { display: none; }

        .slider-item {
            flex: 0 0 320px;
            scroll-snap-align: start;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .game-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        /* AI Chat Box Styles */
        #ai-chat-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        #ai-chat-window {
            width: 350px;
            height: 500px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: none;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        #ai-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 16px;
            font-size: 0.875rem;
            line-height: 1.4;
        }

        .message.ai {
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #666;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }
    </style>
</head>

            <div class="flex items-center gap-3 cursor-pointer shrink-0" onclick="showDashboard()">

                           onkeyup="handleSearch(this.value)">

            </div>

            <!-- Sağ İkonlar -->
            <div class="flex items-center gap-4 shrink-0">

        </div>

        <div id="category-container" class="max-w-7xl mx-auto px-6 pb-4 pt-2 flex items-center gap-3 overflow-x-auto no-scrollbar">
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <!-- DASHBOARD -->
        <div id="dashboard">

            <section>

                        Oyun Kütüphanesi

                </div>
                <div id="game-grid" class="game-grid-container"></div>
            </section>
        </div>

        <div id="game-view" class="hidden">

            let cat = "Arcade";
            let icon = "fa-gamepad";
            let color = "from-zinc-700 to-zinc-900";
            
            const n = name.toLowerCase();
            if(n.includes("soccer") || n.includes("football") || n.includes("basketball") || n.includes("golf") || n.includes("bowl") || n.includes("tennis") || n.includes("volley") || n.includes("kick")) { cat = "Spor"; icon = "fa-futbol"; color = "from-green-500 to-emerald-700"; }
            else if(n.includes("car") || n.includes("moto") || n.includes("bike") || n.includes("drive") || n.includes("drift") || n.includes("truck") || n.includes("racing") || n.includes("wheely") || n.includes("rider")) { cat = "Yarış"; icon = "fa-car-side"; color = "from-orange-500 to-red-600"; }
            else if(n.includes("clicker") || n.includes("idle") || n.includes("trimps") || n.includes("mining")) { cat = "Tıklama"; icon = "fa-mouse-pointer"; color = "from-yellow-500 to-amber-700"; }
            else if(n.includes("puzzle") || n.includes("1010") || n.includes("2048") || n.includes("sort") || n.includes("math") || n.includes("word") || n.includes("guess") || n.includes("riddle")) { cat = "Bulmaca"; icon = "fa-puzzle-piece"; color = "from-purple-500 to-indigo-700"; }
            else if(n.includes("mario") || n.includes("dash") || n.includes("vex") || n.includes("run") || n.includes("jump") || n.includes("slope") || n.includes("parkour") || n.includes("climb")) { cat = "Platform"; icon = "fa-running"; color = "from-blue-500 to-cyan-700"; }
            else if(n.includes("gun") || n.includes("sniper") || n.includes("shooter") || n.includes("strike") || n.includes("assassin") || n.includes("blood") || n.includes("combat") || n.includes("war") || n.includes("fight") || n.includes("battle") || n.includes("kill") || n.includes("ninja") || n.includes("sword") || n.includes("weapon")) { cat = "Aksiyon"; icon = "fa-crosshairs"; color = "from-red-600 to-rose-900"; }
            else if(n.includes(".io")) { cat = "IO"; icon = "fa-globe"; color = "from-teal-500 to-emerald-700"; }
            else if(n.includes("pokemon") || n.includes("minecraft") || n.includes("craft") || n.includes("mine ") || n.includes("survival")) { cat = "Macera"; icon = "fa-map-marked-alt"; color = "from-emerald-600 to-lime-700"; }
            else if(n.includes("escape") || n.includes("room") || n.includes("house") || n.includes("hotel")) { cat = "Gizem"; icon = "fa-door-open"; color = "from-slate-700 to-slate-900"; }
            
            return { id, name, cat, icon, color };
        });

        let currentActiveGame = null;
        let isMuted = false;

        function initApp() {
            renderCategories();
            renderGrid(gameLibrary);
            renderSlider();
            document.getElementById('library-count').innerText = `${gameLibrary.length} OYUN`;
        }

        function renderCategories() {
            const container = document.getElementById('category-container');
            const categories = ["Tümü", ...new Set(gameLibrary.map(g => g.cat))];
            container.innerHTML = categories.map((cat, idx) => `
                <button onclick="filterCategory('${cat}')" 
                        class="category-pill px-5 py-2 rounded-full bg-white/5 border border-white/10 text-xs font-bold uppercase tracking-wide ${idx === 0 ? 'active' : ''}">
                    ${cat}
                </button>
            `).join('');
        }

        function renderGrid(games) {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = "";
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = "game-card bg-zinc-900/40 backdrop-blur-md rounded-3xl overflow-hidden cursor-pointer group flex flex-col";
                card.onclick = () => loadGame(game.id);
                card.innerHTML = `
                    <div class="h-36 bg-gradient-to-br ${game.color} flex items-center justify-center relative overflow-hidden">
                        <i class="fas ${game.icon} text-5xl text-white/30 group-hover:scale-125 group-hover:text-white transition-all duration-700 z-10 drop-shadow-xl"></i>
                        <div class="absolute bottom-2 right-3 text-[10px] font-mono font-black text-white/40 uppercase bg-black/20 px-2 py-1 rounded">#${game.id}</div>
                    </div>
                    <div class="p-5 flex-1 flex flex-col justify-between">
                        <div>
                            <span class="text-[9px] font-black uppercase tracking-widest text-red-500 mb-1 block">${game.cat}</span>
                            <h3 class="text-sm font-bold text-white group-hover:text-red-500 transition-colors uppercase tracking-tight">${game.name}</h3>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderSlider() {
            const slider = document.getElementById('recommendation-slider');
            const randomGames = [...gameLibrary].sort(() => 0.5 - Math.random()).slice(0, 6);
            slider.innerHTML = "";
            randomGames.forEach(game => {
                const item = document.createElement('div');
                item.className = "slider-item group cursor-pointer shadow-xl";
                item.onclick = () => loadGame(game.id);
                item.innerHTML = `
                    <div class="h-48 rounded-3xl bg-gradient-to-br ${game.color} p-6 flex flex-col justify-between border border-white/10 relative overflow-hidden">
                        <i class="fas ${game.icon} text-[80px] text-white/10 absolute -right-4 -bottom-4 group-hover:scale-110 group-hover:-rotate-12 transition-transform duration-500"></i>
                        <span class="bg-black/30 self-start px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest backdrop-blur-sm text-white shadow-lg">${game.cat}</span>
                        <div>
                            <h4 class="text-xl font-black text-white uppercase tracking-tighter leading-none mb-2 drop-shadow-lg">${game.name}</h4>
                            <p class="text-[10px] bg-white/20 inline-block px-3 py-1 rounded-full text-white uppercase font-bold backdrop-blur-sm group-hover:bg-white/40 transition-colors">
                                Hemen Oyna <i class="fas fa-play ml-1"></i>
                            </p>
                        </div>
                    </div>
                `;
                slider.appendChild(item);
            });
        }

        function scrollSlider(dir) {
            const s = document.getElementById('recommendation-slider');
            s.scrollBy({ left: dir * 340, behavior: 'smooth' });
        }

        function handleSearch(val) {
            const results = document.getElementById('search-results');
            if(!val) { results.style.display = 'none'; return; }
            const filtered = gameLibrary.filter(g => g.name.toLowerCase().startsWith(val.toLowerCase()));
            if(filtered.length > 0) {
                results.style.display = 'block';
                results.innerHTML = filtered.map(g => `
                    <div class="px-5 py-3 hover:bg-zinc-800 cursor-pointer flex items-center gap-4 border-b border-white/5 transition-colors" onclick="loadGame('${g.id}')">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br ${g.color} flex items-center justify-center shadow-lg">
                            <i class="fas ${g.icon} text-white"></i>
                        </div>
                        <div>
                            <div class="text-sm font-bold text-white uppercase">${g.name}</div>
                            <div class="text-[9px] text-zinc-500 uppercase font-black tracking-widest">${g.cat}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                results.innerHTML = `<div class="p-6 text-center text-xs text-zinc-500 uppercase font-bold tracking-widest">Oyun Bulunamadı</div>`;
                results.style.display = 'block';
            }
        }

        function filterCategory(cat) {
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.trim() === cat.toUpperCase()) btn.classList.add('active');
            });
            if(cat === 'Tümü') renderGrid(gameLibrary);
            else renderGrid(gameLibrary.filter(g => g.cat === cat));
        }

        function loadGame(gameId) {
            const game = gameLibrary.find(g => g.id === gameId);
            if(!game) return;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('search-results').style.display = 'none';
            document.getElementById('game-search').value = "";
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('active-game-title').innerText = game.name;
            document.getElementById('active-game-cat').innerText = game.cat;
            document.getElementById('active-game-id').innerText = `ID: ${game.id}`;
            const target = document.getElementById('iframe-target');
            target.innerHTML = `<iframe id="active-frame" src="https://quiz-8.org/lessons/lesson-${gameId}/" allow="autoplay; fullscreen; keyboard; gamepad" loading="eager"></iframe>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('iframe-target').innerHTML = "";
            renderSlider();
        }

        function reloadActiveGame() {
            const frame = document.getElementById('active-frame');
            if(frame) frame.src = frame.src;
        }

        function toggleFullscreen() {
            const elem = document.getElementById('active-frame');
            if (elem?.requestFullscreen) elem.requestFullscreen();
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-icon').className = isMuted ? "fas fa-volume-mute" : "fas fa-volume-up";
            document.getElementById('mute-btn').classList.toggle('text-red-600', isMuted);
        }

        // AI Chat Logic
        let chatVisible = false;
        const apiKey = ""; // Runtime provides key

        function toggleAIChat() {
            chatVisible = !chatVisible;
            document.getElementById('ai-chat-window').style.display = chatVisible ? 'flex' : 'none';
        }

        async function sendAIMessage() {
            const input = document.getElementById('ai-input');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';
            
            const typingIndicator = document.getElementById('ai-typing');
            typingIndicator.classList.remove('hidden');

            try {
                const response = await callGeminiAPI(message);
                addMessage(response, 'ai');
            } catch (error) {
                addMessage("Üzgünüm, şu an cevap veremiyorum. Lütfen daha sonra tekrar deneyin.", 'ai');
            } finally {
                typingIndicator.classList.add('hidden');
            }
        }

        function addMessage(text, sender) {
            const container = document.getElementById('ai-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        async function callGeminiAPI(prompt) {
            const systemPrompt = `Sen oHenx Premium v1 portalının akıllı asistanısın. 
            Kullanıcılara oyunlar hakkında bilgi verirsin. Sitede 550'den fazla oyun var. 
            Kısa, samimi ve oyuncu dostu bir dil kullan. 
            Portalın ismi: oHenx Premium v1. Sahibi oHenx. 
            Şu anki yıl: 2026.`;

            let retries = 5;
            let delay = 1000;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    if (!response.ok) throw new Error('API Error');
                    
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Anlayamadım, tekrar eder misin?";
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        document.addEventListener('click', (e) => {
            if(!e.target.closest('#game-search') && !e.target.closest('#search-results')) {
                document.getElementById('search-results').style.display = 'none';
            }
        });

        initApp();
    </script>
</body>
</html>
